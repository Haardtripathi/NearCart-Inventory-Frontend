<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NearCart Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      .card {
        width: min(92vw, 420px);
        border: 1px solid #cbd5e1;
        border-radius: 14px;
        background: white;
        padding: 28px;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>NearCart is available as an installed app, but this screen needs a connection before it can refresh live inventory data.</p>
    </div>
  </body>
</html>
